services:
  backend:
    build: .
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      PYTHONPATH: /app
      DB_TYPE: mysql+pymysql
      DB_LOGIN: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      DB_IP: mysql
      DB_PORT: 3306
      DB_NAME: rentsense
    depends_on:
      mysql:
        condition: service_started
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    command: python app/main.py

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      MYSQL_DATABASE: rentsense
      MYSQL_USER: rentsense
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rentsense}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  parser:
    build: .
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      PYTHONPATH: /app
      DB_TYPE: mysql+pymysql
      DB_LOGIN: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      DB_IP: mysql
      DB_PORT: 3306
      DB_NAME: rentsense
    depends_on:
      mysql:
        condition: service_started
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
    command: python -m app.scheduler.crontab

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_started

  streamlit:
    build: .
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      PYTHONPATH: /app
      API_BASE_URL: http://backend:8000/api
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    command: streamlit run app/ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0

  telegram_bot:
    build: .
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      PYTHONPATH: /app
      DB_TYPE: mysql+pymysql
      DB_LOGIN: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      DB_IP: mysql
      DB_PORT: 3306
      DB_NAME: rentsense
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_started
    volumes:
      - ./:/app
      - ./logs:/app/logs
    command: python -m app.bot.telegram_bot

volumes:
  mysql_data:
    driver: local

